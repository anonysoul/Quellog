name: Firmware CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "firmware/**"
  pull_request:
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "firmware/**"

permissions:
  contents: read

jobs:
  firmware-build:
    name: Build firmware (esp32s3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate build script syntax
        run: bash -n build.sh

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.3.2

      - name: Build ESP-IDF project
        run: |
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-esp32s3
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/*.map
            firmware/build/bootloader/*.bin
            firmware/build/partition_table/*.bin
            firmware/sdkconfig
          if-no-files-found: error
