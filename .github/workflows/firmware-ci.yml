name: Firmware CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "firmware/**"
  pull_request:
    paths:
      - ".github/workflows/firmware-ci.yml"
      - "firmware/**"

permissions:
  contents: read

jobs:
  firmware-build:
    name: Build firmware (esp32s3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate build script syntax
        run: bash -n firmware/build.sh

      - name: Build ESP-IDF project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32s3
          path: firmware
          command: idf.py reconfigure build

      - name: Upload firmware build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-esp32s3
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/*.map
            firmware/build/bootloader/*.bin
            firmware/build/partition_table/*.bin
            firmware/sdkconfig
          if-no-files-found: error
