<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>配网完成</title>
  </head>
  <body>
    <main class="shell shell-done">
      <section class="panel panel-done">
        <p class="eyebrow">SETUP COMPLETE</p>
        <h1>配网完成</h1>
        <p class="hero-copy">
          设备正在退出配网热点，并尝试连接你刚刚提交的家庭网络。
        </p>
        <p class="hero-copy secondary-copy">
          如果浏览器仍停留在当前页面，可以手动请求设备立即退出配网模式。
        </p>
        <button id="exit" class="primary-button" type="button">立即退出配网</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="/src/done.js"></script>
  </body>
</html>
